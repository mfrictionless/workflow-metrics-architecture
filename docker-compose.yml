# Monorepo compose file. One service per pipeline component, added as each
# is built — see design/Technical-Design.md §9 (Repository layout).
# Settings are sourced from .env at the repo root; edit that file to adjust
# ports/credentials for your environment.

services:
  ods-postgres:
    image: postgres:18-alpine
    # wal_level=logical enables CDC (M2.1) -- a postmaster-context setting,
    # only applied at server start, so it's passed as a command-line
    # override rather than set via SQL. max_wal_senders/max_replication_slots
    # default to 10 in the base image, comfortably enough for this example's
    # single slot.
    command: ["postgres", "-c", "wal_level=logical"]
    environment:
      POSTGRES_DB: ${ODS_POSTGRES_DB}
      POSTGRES_USER: ${ODS_POSTGRES_USER}
      POSTGRES_PASSWORD: ${ODS_POSTGRES_PASSWORD}
    ports:
      - "${ODS_POSTGRES_PORT}:5432"
    volumes:
      - ods_data:/var/lib/postgresql
      - ./ods/ddl:/docker-entrypoint-initdb.d:ro

  # Single-node Kafka broker, KRaft mode (no Zookeeper) -- combined
  # broker+controller. Two listeners: PLAINTEXT for other compose services
  # (e.g. Kafka Connect, M2.3), HOST for host-side tools via KAFKA_BROKER_PORT
  # in .env. See design/Milestones.md M2.2.
  kafka:
    image: apache/kafka:latest
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093,HOST://:9094
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,HOST://localhost:${KAFKA_BROKER_PORT}
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,HOST:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      # Single-broker dev setup: internal topics need replication factor 1,
      # not the default 3, or their creation hangs waiting for replicas that
      # will never exist.
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_LOG_DIRS: /var/lib/kafka/data
    ports:
      - "${KAFKA_BROKER_PORT}:9094"
    volumes:
      - kafka_data:/var/lib/kafka/data

  # Second, separate Postgres instance for the warehouse (Raw -> staging ->
  # intermediate -> marts, M2.5+). Entirely distinct from ods-postgres -- own
  # container, own volume, own port -- so CDC never adds load to the write
  # primary (FR-2). No schema applied yet; the JDBC sink connector (M2.5)
  # lands Raw tables here. See design/Milestones.md M2.4.
  warehouse-postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: ${WAREHOUSE_POSTGRES_DB}
      POSTGRES_USER: ${WAREHOUSE_POSTGRES_USER}
      POSTGRES_PASSWORD: ${WAREHOUSE_POSTGRES_PASSWORD}
    ports:
      - "${WAREHOUSE_POSTGRES_PORT}:5432"
    volumes:
      - warehouse_data:/var/lib/postgresql
      - ./warehouse/ddl:/docker-entrypoint-initdb.d:ro

  # Kafka Connect worker (Debezium Postgres connector plugin pre-installed) --
  # distributed mode with a single worker: connector config/offsets/status
  # live in Kafka topics (below), not local files, so the worker holds no
  # state outside Kafka or the volumes already declared. The actual source
  # connector (cdc/debezium-postgres-source.json) is registered separately
  # via the REST API -- this service only brings the worker itself up. See
  # design/Milestones.md M2.3.
  kafka-connect:
    image: quay.io/debezium/connect:latest
    depends_on:
      - kafka
      - ods-postgres
    environment:
      BOOTSTRAP_SERVERS: kafka:9092
      GROUP_ID: 1
      CONFIG_STORAGE_TOPIC: connect-configs
      OFFSET_STORAGE_TOPIC: connect-offsets
      STATUS_STORAGE_TOPIC: connect-status
      # Single-broker dev setup, same reasoning as M2.2's internal Kafka
      # topics: replication factor 1, not the default 3.
      CONNECT_CONFIG_STORAGE_REPLICATION_FACTOR: 1
      CONNECT_OFFSET_STORAGE_REPLICATION_FACTOR: 1
      CONNECT_STATUS_STORAGE_REPLICATION_FACTOR: 1
      CONNECT_REST_ADVERTISED_HOST_NAME: kafka-connect
    ports:
      - "${CONNECT_REST_PORT}:8083"

  # dbt Core project (Raw -> staging -> intermediate -> marts, M3+), run on demand via
  # `docker compose run`, not a long-running service. Official dbt Labs image
  # (Postgres adapter pre-installed) has no arm64 build -- platform pinned to
  # linux/amd64 (Rosetta emulation on Apple Silicon), confirmed by inspecting
  # its manifest. Project files mounted straight into the image's default
  # working dir; profiles.yml lives alongside dbt_project.yml in the same
  # mount, found via DBT_PROFILES_DIR rather than dbt's default ~/.dbt/.
  # See design/Milestones.md M3.1.
  dbt:
    image: ghcr.io/dbt-labs/dbt-postgres:1.8.latest
    platform: linux/amd64
    profiles: ["tools"]
    depends_on:
      - warehouse-postgres
    environment:
      DBT_PROFILES_DIR: /usr/app/dbt
      WAREHOUSE_POSTGRES_USER: ${WAREHOUSE_POSTGRES_USER}
      WAREHOUSE_POSTGRES_PASSWORD: ${WAREHOUSE_POSTGRES_PASSWORD}
      WAREHOUSE_POSTGRES_DB: ${WAREHOUSE_POSTGRES_DB}
    volumes:
      - ./warehouse/dbt:/usr/app/dbt

  # On-demand job, not a long-running service -- `profiles` keeps it out of a
  # bare `docker compose up`; run explicitly via `docker compose run simulator`
  # (make simulate), which targets a named service regardless of profile.
  simulator:
    build: ./simulator
    profiles: ["tools"]
    depends_on:
      - ods-postgres
    environment:
      ODS_POSTGRES_HOST: ods-postgres
      ODS_POSTGRES_PORT: 5432
      ODS_POSTGRES_DB: ${ODS_POSTGRES_DB}
      ODS_POSTGRES_USER: ${ODS_POSTGRES_USER}
      ODS_POSTGRES_PASSWORD: ${ODS_POSTGRES_PASSWORD}
      COUNT: ${COUNT:-${SIMULATOR_FILE_COUNT}}

volumes:
  ods_data:
  warehouse_data:
  kafka_data:
